name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build Java and Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Build Docker image
        run: docker build --tag hantang-web-backend:ci .
